<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380" role="img" aria-label="Swiss cheese model: seven layers of agent guardrails from high-quality codebase to human review.">
  <defs>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#F59E0B" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-4%" width="120%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="900" height="380" fill="white"/>

  <!-- Flow shape -->
  <polygon points="18,78 878,153 878,170 18,248" fill="url(#flowGrad)"/>

  <!-- Left: mistakes flow into layers -->
  <line x1="15" y1="163" x2="80" y2="163" stroke="#EF4444" stroke-width="2.2" opacity="0.45" stroke-dasharray="6,4"/>
  <polygon points="80,157 94,163 80,169" fill="#EF4444" opacity="0.55"/>
  <text x="48" y="135" font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="11" font-weight="600" fill="#DC2626" text-anchor="middle" opacity="0.85">Mistakes</text>

  <!-- Right -->
  <line x1="800" y1="163" x2="868" y2="163" stroke="#16A34A" stroke-width="1.5" opacity="0.45" stroke-dasharray="6,4"/>
  <polygon points="868,157 882,163 868,169" fill="#16A34A" opacity="0.55"/>
  <text x="842" y="135" font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="11" font-weight="600" fill="#16A34A" text-anchor="middle" opacity="0.85">Quality code</text>

  <!-- Slice 1: High-quality codebase  #6366F1  cx=125 -->
  <g transform="rotate(-4,125,165)" filter="url(#shadow)">
    <rect x="101" y="55" width="48" height="220" rx="6" fill="#6366F1" opacity="0.92"/>
    <circle cx="116" cy="95" r="9" fill="white" opacity="0.55"/>
    <circle cx="136" cy="158" r="7" fill="white" opacity="0.52"/>
    <circle cx="114" cy="220" r="10" fill="white" opacity="0.55"/>
    <circle cx="132" cy="252" r="5" fill="white" opacity="0.50"/>
  </g>
  <text x="125" y="298" font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="700" fill="#4F46E5" text-anchor="middle">High-quality</text>
  <text x="125" y="312" font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="700" fill="#4F46E5" text-anchor="middle">codebase</text>

  <!-- Slice 2: Rules & skills  #8B5CF6  cx=233 -->
  <g transform="rotate(3,233,165)" filter="url(#shadow)">
    <rect x="209" y="55" width="48" height="220" rx="6" fill="#8B5CF6" opacity="0.92"/>
    <circle cx="241" cy="88" r="8" fill="white" opacity="0.55"/>
    <circle cx="222" cy="150" r="9" fill="white" opacity="0.52"/>
    <circle cx="244" cy="212" r="7" fill="white" opacity="0.55"/>
    <circle cx="226" cy="248" r="5" fill="white" opacity="0.50"/>
  </g>
  <text x="233" y="298" font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="700" fill="#7C3AED" text-anchor="middle">Rules &amp;</text>
  <text x="233" y="312" font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="700" fill="#7C3AED" text-anchor="middle">skills</text>

  <!-- Slice 3: Linting  #EC4899  cx=342 -->
  <g transform="rotate(-5,342,165)" filter="url(#shadow)">
    <rect x="318" y="55" width="48" height="220" rx="6" fill="#EC4899" opacity="0.92"/>
    <circle cx="337" cy="100" r="8" fill="white" opacity="0.55"/>
    <circle cx="352" cy="172" r="6" fill="white" opacity="0.52"/>
    <circle cx="330" cy="235" r="9" fill="white" opacity="0.55"/>
    <circle cx="350" cy="130" r="5" fill="white" opacity="0.50"/>
  </g>
  <text x="342" y="305" font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="700" fill="#DB2777" text-anchor="middle">Linting</text>

  <!-- Slice 4: Type checking  #F97316  cx=450 -->
  <g transform="rotate(4,450,165)" filter="url(#shadow)">
    <rect x="426" y="55" width="48" height="220" rx="6" fill="#F97316" opacity="0.92"/>
    <circle cx="441" cy="108" r="8" fill="white" opacity="0.55"/>
    <circle cx="462" cy="168" r="10" fill="white" opacity="0.52"/>
    <circle cx="438" cy="228" r="6" fill="white" opacity="0.55"/>
    <circle cx="458" cy="255" r="5" fill="white" opacity="0.50"/>
  </g>
  <text x="450" y="298" font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="700" fill="#EA580C" text-anchor="middle">Type</text>
  <text x="450" y="312" font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="700" fill="#EA580C" text-anchor="middle">checking</text>

  <!-- Slice 5: Unit & E2E tests  #EAB308  cx=558 -->
  <g transform="rotate(-3,558,165)" filter="url(#shadow)">
    <rect x="534" y="55" width="48" height="220" rx="6" fill="#EAB308" opacity="0.92"/>
    <circle cx="549" cy="92" r="7" fill="white" opacity="0.55"/>
    <circle cx="570" cy="162" r="9" fill="white" opacity="0.52"/>
    <circle cx="545" cy="222" r="8" fill="white" opacity="0.55"/>
    <circle cx="566" cy="255" r="5" fill="white" opacity="0.50"/>
  </g>
  <text x="558" y="298" font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="700" fill="#CA8A04" text-anchor="middle">Unit &amp; E2E</text>
  <text x="558" y="312" font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="700" fill="#CA8A04" text-anchor="middle">tests</text>

  <!-- Slice 6: AI review  #06B6D4  cx=667 -->
  <g transform="rotate(5,667,165)" filter="url(#shadow)">
    <rect x="643" y="55" width="48" height="220" rx="6" fill="#06B6D4" opacity="0.92"/>
    <circle cx="657" cy="96" r="9" fill="white" opacity="0.55"/>
    <circle cx="678" cy="155" r="6" fill="white" opacity="0.52"/>
    <circle cx="653" cy="225" r="7" fill="white" opacity="0.55"/>
    <circle cx="674" cy="195" r="5" fill="white" opacity="0.50"/>
  </g>
  <text x="667" y="298" font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="700" fill="#0891B2" text-anchor="middle">AI</text>
  <text x="667" y="312" font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="700" fill="#0891B2" text-anchor="middle">review</text>

  <!-- Slice 7: Human review  #22C55E  cx=775 -->
  <g transform="rotate(-4,775,165)" filter="url(#shadow)">
    <rect x="751" y="55" width="48" height="220" rx="6" fill="#22C55E" opacity="0.92"/>
    <circle cx="766" cy="90" r="8" fill="white" opacity="0.55"/>
    <circle cx="786" cy="158" r="9" fill="white" opacity="0.52"/>
    <circle cx="762" cy="220" r="6" fill="white" opacity="0.55"/>
    <circle cx="782" cy="252" r="5" fill="white" opacity="0.50"/>
  </g>
  <text x="775" y="298" font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="700" fill="#16A34A" text-anchor="middle">Human</text>
  <text x="775" y="312" font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="700" fill="#16A34A" text-anchor="middle">review</text>

  <!-- Caption -->
  <text x="450" y="358" font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="11.5" fill="#64748B" text-anchor="middle" font-style="italic">Each layer has imperfections (holes). Multiple layers stacked together catch what slips through.</text>
</svg>
